services:
  # === Application Services ===

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      PYTHONPATH: /app
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET}
      SECRETS_ENCRYPTION_KEY: ${SECRETS_ENCRYPTION_KEY}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://127.0.0.1:8000/health" ]
      interval: 2s
      timeout: 1s
      retries: 10
      start_period: 5s
    networks:
      - internal
      - worker
    volumes:
      - ./services/api/src:/app/src:delegated
      - ./services/api/alembic.ini:/app/alembic.ini:ro
      - ./services/api/migrations:/app/migrations:delegated
      - ./shared:/app/shared:delegated
      - ./scripts:/app/scripts:ro
      - ${GITHUB_APP_PEM_PATH:-./secrets/github_app.pem}:/app/keys/github_app.pem:ro
    ports:
      - "8000:8000"

  langgraph:
    build:
      context: .
      dockerfile: services/langgraph/Dockerfile
    env_file:
      - .env
    environment:
      API_BASE_URL: http://api:8000
      PYTHONPYCACHEPREFIX: /tmp/pycache
      REDIS_URL: redis://redis:6379
      PYTHONPATH: /app
      DEFAULT_AGENT_TYPE: ${DEFAULT_AGENT_TYPE:-claude}
      GITHUB_ORG: ${GITHUB_ORG}
      PO_LLM_MODEL: ${PO_LLM_MODEL:-}
      PO_LLM_BASE_URL: ${PO_LLM_BASE_URL:-}
      PO_LLM_API_KEY: ${PO_LLM_API_KEY:-}
      CHECKPOINT_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?options=-c%20search_path%3Dlanggraph
      SUMMARIZATION_MODEL: ${SUMMARIZATION_MODEL}
      SUMMARIZATION_MAX_TOKENS: ${SUMMARIZATION_MAX_TOKENS}
      SUMMARIZATION_TRIGGER_TOKENS: ${SUMMARIZATION_TRIGGER_TOKENS}
      SUMMARIZATION_MAX_SUMMARY_TOKENS: ${SUMMARIZATION_MAX_SUMMARY_TOKENS}
      SECRETS_ENCRYPTION_KEY: ${SECRETS_ENCRYPTION_KEY}
    volumes:
      - ./services/langgraph/src:/app/src:delegated
      - ./shared:/app/shared:delegated
      - ${GITHUB_APP_PEM_PATH:-./secrets/github_app.pem}:/app/keys/github_app.pem:ro
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  # Phase 4 Workers
  deploy-worker:
    build:
      context: .
      dockerfile: services/langgraph/Dockerfile
    command: python -m src.workers.deploy_worker
    env_file:
      - .env
    environment:
      API_BASE_URL: http://api:8000
      REDIS_URL: redis://redis:6379
      PYTHONPATH: /app
      SECRETS_ENCRYPTION_KEY: ${SECRETS_ENCRYPTION_KEY}
      ORCHESTRATOR_HOSTNAME: ${ORCHESTRATOR_HOSTNAME}
      REGISTRY_USER: ${REGISTRY_USER}
      REGISTRY_PASSWORD: ${REGISTRY_PASSWORD}
      TELETHON_API_ID: ${TELETHON_API_ID:-}
      TELETHON_API_HASH: ${TELETHON_API_HASH:-}
      TELETHON_SESSION_PATH: ${TELETHON_SESSION_PATH:-}
    volumes:
      - ./services/langgraph/src:/app/src:delegated
      - ./shared:/app/shared:delegated
      - ${GITHUB_APP_PEM_PATH:-./secrets/github_app.pem}:/app/keys/github_app.pem:ro
      - ${TELETHON_SESSION_DIR:-./secrets/telethon}:/app/telethon:ro
    depends_on:
      - api
      - redis
    networks:
      - internal
    restart: unless-stopped
    deploy:
      replicas: 1

  engineering-worker:
    build:
      context: .
      dockerfile: services/langgraph/Dockerfile
    command: python -m src.workers.engineering_worker
    env_file:
      - .env
    environment:
      API_BASE_URL: http://api:8000
      REDIS_URL: redis://redis:6379
      PYTHONPATH: /app
      GITHUB_ORG: ${GITHUB_ORG}
      SECRETS_ENCRYPTION_KEY: ${SECRETS_ENCRYPTION_KEY}
      ORCHESTRATOR_HOSTNAME: ${ORCHESTRATOR_HOSTNAME}
      REGISTRY_USER: ${REGISTRY_USER}
      REGISTRY_PASSWORD: ${REGISTRY_PASSWORD}
    volumes:
      - ./services/langgraph/src:/app/src:delegated
      - ./shared:/app/shared:delegated
      - ${GITHUB_APP_PEM_PATH:-./secrets/github_app.pem}:/app/keys/github_app.pem:ro
    depends_on:
      - api
      - redis
    networks:
      - internal
    restart: unless-stopped
    deploy:
      replicas: 1

  infra-service:
    build:
      context: .
      dockerfile: services/infra-service/Dockerfile
    env_file:
      - .env
    environment:
      API_BASE_URL: http://api:8000
      REDIS_URL: redis://redis:6379
      PYTHONPATH: /app
    volumes:
      - ./services/infra-service/src:/app/src:delegated
      - ./services/infra-service/ansible:/app/ansible:delegated
      - ./shared:/app/shared:delegated
    depends_on:
      - api
      - redis
    networks:
      - internal
    restart: unless-stopped

  telegram_bot:
    build:
      context: .
      dockerfile: services/telegram_bot/Dockerfile
    env_file:
      - .env
    environment:
      API_BASE_URL: http://api:8000
      PYTHONPYCACHEPREFIX: /tmp/pycache
      REDIS_URL: redis://redis:6379
      DEFAULT_AGENT_TYPE: ${DEFAULT_AGENT_TYPE:-claude}
    volumes:
      - ./services/telegram_bot/src:/app/src:delegated
      - ./shared:/app/shared:delegated
    depends_on:
      - api
      - redis
    networks:
      - internal

  worker-manager:
    build:
      context: .
      dockerfile: services/worker-manager/Dockerfile
    user: root # Required for Docker daemon access (manages worker containers and networks on host)
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379
      API_BASE_URL: http://api:8000
      PYTHONPATH: /app
      SECRETS_ENCRYPTION_KEY: ${SECRETS_ENCRYPTION_KEY}
      # Host path for mounting .claude dir into workers
      HOST_CLAUDE_DIR: ${HOST_CLAUDE_DIR:-/home/user/.claude}
      # Dev environment settings
      WORKSPACE_BASE_PATH: /tmp/codegen/workspaces
      INTERNAL_NETWORK: codegen_internal
      WORKER_NETWORK: codegen_worker
      WORKER_MANAGER_URL: http://worker-manager:8000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/codegen/workspaces:/tmp/codegen/workspaces
      - ${HOST_CLAUDE_DIR:-/home/user/.claude}:/host-claude:ro
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
      - worker

  scheduler:
    build:
      context: .
      dockerfile: services/scheduler/Dockerfile
    env_file:
      - .env
    environment:
      API_BASE_URL: http://api:8000
      PYTHONPYCACHEPREFIX: /tmp/pycache
      REDIS_URL: redis://redis:6379
      PYTHONPATH: /app
    volumes:
      - ./services/scheduler/src:/app/src:delegated
      - ./shared:/app/shared:delegated
      - ${GITHUB_APP_PEM_PATH:-./secrets/github_app.pem}:/app/keys/github_app.pem:ro
    depends_on:
      api:
        condition: service_healthy
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  # === Reverse Proxy + Registry ===

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      ORCHESTRATOR_HOSTNAME: ${ORCHESTRATOR_HOSTNAME}
      REGISTRY_USER: ${REGISTRY_USER}
      REGISTRY_PASSWORD_HASH: ${REGISTRY_PASSWORD_HASH}
    depends_on:
      - api
      - registry
    networks:
      - internal
    restart: unless-stopped

  registry:
    image: registry:2
    environment:
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
    volumes:
      - registry-data:/var/lib/registry
    networks:
      - internal
    restart: unless-stopped

  # === Infrastructure ===

  db:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-orchestrator}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 2s
      timeout: 1s
      retries: 5
      start_period: 5s
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - internal

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 2s
      timeout: 1s
      retries: 5
      start_period: 2s
    networks:
      - internal
      - worker

networks:
  internal:
    name: codegen_internal
  worker:
    name: codegen_worker

volumes:
  db_data:
  redis_data:
  caddy-data:
  caddy-config:
  registry-data:
  uv-cache:
