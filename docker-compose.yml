services:
  # === Application Services ===

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      PYTHONPATH: /app
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET}
      SECRETS_ENCRYPTION_KEY: ${SECRETS_ENCRYPTION_KEY}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      SERVICE_NAME: api
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://127.0.0.1:8000/health" ]
      interval: 2s
      timeout: 1s
      retries: 10
      start_period: 5s
    networks:
      - internal
      - worker
    volumes:
      - ./services/api/src:/app/src:delegated
      - ./services/api/alembic.ini:/app/alembic.ini:ro
      - ./services/api/migrations:/app/migrations:delegated
      - ./shared:/app/shared:delegated
      - ./scripts:/app/scripts:ro
      - ${GITHUB_APP_PEM_PATH:-./secrets/github_app.pem}:/app/keys/github_app.pem:ro
    ports:
      - "8000:8000"

  langgraph:
    build:
      context: .
      dockerfile: services/langgraph/Dockerfile
    env_file:
      - .env
    environment:
      API_BASE_URL: http://api:8000
      PYTHONPYCACHEPREFIX: /tmp/pycache
      REDIS_URL: redis://redis:6379
      PYTHONPATH: /app
      DEFAULT_AGENT_TYPE: ${DEFAULT_AGENT_TYPE:-claude}
      GITHUB_ORG: ${GITHUB_ORG}
      PO_LLM_MODEL: ${PO_LLM_MODEL:-}
      PO_LLM_BASE_URL: ${PO_LLM_BASE_URL:-}
      PO_LLM_API_KEY: ${PO_LLM_API_KEY:-}
      CHECKPOINT_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?options=-c%20search_path%3Dlanggraph
      SUMMARIZATION_MODEL: ${SUMMARIZATION_MODEL}
      SUMMARIZATION_MAX_TOKENS: ${SUMMARIZATION_MAX_TOKENS}
      SUMMARIZATION_TRIGGER_TOKENS: ${SUMMARIZATION_TRIGGER_TOKENS}
      SUMMARIZATION_MAX_SUMMARY_TOKENS: ${SUMMARIZATION_MAX_SUMMARY_TOKENS}
      SECRETS_ENCRYPTION_KEY: ${SECRETS_ENCRYPTION_KEY}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      SERVICE_NAME: langgraph
    volumes:
      - ./services/langgraph/src:/app/src:delegated
      - ./shared:/app/shared:delegated
      - ${GITHUB_APP_PEM_PATH:-./secrets/github_app.pem}:/app/keys/github_app.pem:ro
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  # Phase 4 Workers
  deploy-worker:
    build:
      context: .
      dockerfile: services/langgraph/Dockerfile
    command: python -m src.consumers.deploy
    env_file:
      - .env
    environment:
      API_BASE_URL: http://api:8000
      REDIS_URL: redis://redis:6379
      PYTHONPATH: /app
      SECRETS_ENCRYPTION_KEY: ${SECRETS_ENCRYPTION_KEY}
      ORCHESTRATOR_HOSTNAME: ${ORCHESTRATOR_HOSTNAME}
      REGISTRY_USER: ${REGISTRY_USER}
      REGISTRY_PASSWORD: ${REGISTRY_PASSWORD}
      TELETHON_API_ID: ${TELETHON_API_ID:-}
      TELETHON_API_HASH: ${TELETHON_API_HASH:-}
      TELETHON_SESSION_PATH: ${TELETHON_SESSION_PATH:-}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      SERVICE_NAME: deploy-worker
    volumes:
      - ./services/langgraph/src:/app/src:delegated
      - ./shared:/app/shared:delegated
      - ${GITHUB_APP_PEM_PATH:-./secrets/github_app.pem}:/app/keys/github_app.pem:ro
      - ${TELETHON_SESSION_DIR:-./secrets/telethon}:/app/telethon:ro
    depends_on:
      - api
      - redis
    networks:
      - internal
    restart: unless-stopped
    deploy:
      replicas: 1

  engineering-worker:
    build:
      context: .
      dockerfile: services/langgraph/Dockerfile
    command: python -m src.consumers.engineering
    env_file:
      - .env
    environment:
      API_BASE_URL: http://api:8000
      REDIS_URL: redis://redis:6379
      PYTHONPATH: /app
      GITHUB_ORG: ${GITHUB_ORG}
      SECRETS_ENCRYPTION_KEY: ${SECRETS_ENCRYPTION_KEY}
      ORCHESTRATOR_HOSTNAME: ${ORCHESTRATOR_HOSTNAME}
      REGISTRY_USER: ${REGISTRY_USER}
      REGISTRY_PASSWORD: ${REGISTRY_PASSWORD}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      SERVICE_NAME: engineering-worker
    volumes:
      - ./services/langgraph/src:/app/src:delegated
      - ./shared:/app/shared:delegated
      - ${GITHUB_APP_PEM_PATH:-./secrets/github_app.pem}:/app/keys/github_app.pem:ro
    depends_on:
      - api
      - redis
    networks:
      - internal
    restart: unless-stopped
    deploy:
      replicas: 1

  architect:
    build:
      context: .
      dockerfile: services/langgraph/Dockerfile
    command: python -m src.consumers.architect
    env_file:
      - .env
    environment:
      API_BASE_URL: http://api:8000
      REDIS_URL: redis://redis:6379
      PYTHONPATH: /app
      ARCHITECT_LLM_API_KEY: ${ARCHITECT_LLM_API_KEY:-}
      ARCHITECT_LLM_BASE_URL: ${ARCHITECT_LLM_BASE_URL:-}
      ARCHITECT_LLM_MODEL: ${ARCHITECT_LLM_MODEL:-}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      SERVICE_NAME: architect
    volumes:
      - ./services/langgraph/src:/app/src:delegated
      - ./shared:/app/shared:delegated
    depends_on:
      - api
      - redis
    networks:
      - internal
    restart: unless-stopped
    deploy:
      replicas: 1

  infra-service:
    build:
      context: .
      dockerfile: services/infra-service/Dockerfile
    env_file:
      - .env
    environment:
      API_BASE_URL: http://api:8000
      REDIS_URL: redis://redis:6379
      PYTHONPATH: /app
      LOG_FORMAT: ${LOG_FORMAT:-json}
      SERVICE_NAME: infra-service
    volumes:
      - ./services/infra-service/src:/app/src:delegated
      - ./services/infra-service/ansible:/app/ansible:delegated
      - ./shared:/app/shared:delegated
    depends_on:
      - api
      - redis
    networks:
      - internal
    restart: unless-stopped

  telegram_bot:
    build:
      context: .
      dockerfile: services/telegram_bot/Dockerfile
    env_file:
      - .env
    environment:
      API_BASE_URL: http://api:8000
      PYTHONPYCACHEPREFIX: /tmp/pycache
      REDIS_URL: redis://redis:6379
      DEFAULT_AGENT_TYPE: ${DEFAULT_AGENT_TYPE:-claude}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      SERVICE_NAME: telegram-bot
    volumes:
      - ./services/telegram_bot/src:/app/src:delegated
      - ./shared:/app/shared:delegated
    depends_on:
      - api
      - redis
    networks:
      - internal

  worker-manager:
    build:
      context: .
      dockerfile: services/worker-manager/Dockerfile
    user: root # Required for Docker daemon access (manages worker containers and networks on host)
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379
      API_BASE_URL: http://api:8000
      PYTHONPATH: /app
      SECRETS_ENCRYPTION_KEY: ${SECRETS_ENCRYPTION_KEY}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      SERVICE_NAME: worker-manager
      # Host path for mounting .claude dir into workers
      HOST_CLAUDE_DIR: ${HOST_CLAUDE_DIR:-/home/user/.claude}
      # Dev environment settings
      WORKSPACE_BASE_PATH: /tmp/codegen/workspaces
      SCAFFOLDED_WORKSPACE_PATH: /data/workspaces
      INTERNAL_NETWORK: codegen_internal
      WORKER_NETWORK: codegen_worker
      WORKER_MANAGER_URL: http://worker-manager:8000
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /tmp/codegen/workspaces:/tmp/codegen/workspaces
      - ${WORKSPACE_HOST_PATH:-/data/workspaces}:/data/workspaces
      - ${HOST_CLAUDE_DIR:-/home/user/.claude}:/host-claude:ro
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal
      - worker

  scheduler:
    build:
      context: .
      dockerfile: services/scheduler/Dockerfile
    env_file:
      - .env
    environment:
      API_BASE_URL: http://api:8000
      PYTHONPYCACHEPREFIX: /tmp/pycache
      REDIS_URL: redis://redis:6379
      PYTHONPATH: /app
      LOG_FORMAT: ${LOG_FORMAT:-json}
      SERVICE_NAME: scheduler
    volumes:
      - ./services/scheduler/src:/app/src:delegated
      - ./shared:/app/shared:delegated
      - ${GITHUB_APP_PEM_PATH:-./secrets/github_app.pem}:/app/keys/github_app.pem:ro
    depends_on:
      api:
        condition: service_healthy
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  scaffolder:
    build:
      context: .
      dockerfile: services/scaffolder/Dockerfile
    env_file:
      - .env
    environment:
      API_BASE_URL: http://api:8000
      REDIS_URL: redis://redis:6379
      PYTHONPATH: /app
      WORKSPACE_BASE_PATH: /data/workspaces
      SERVICE_TEMPLATE_PATH: /data/service-template
      GITHUB_ORG: ${GITHUB_ORG}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      SERVICE_NAME: scaffolder
    volumes:
      - ./services/scaffolder/src:/app/src:delegated
      - ./shared:/app/shared:delegated
      - ${GITHUB_APP_PEM_PATH:-./secrets/github_app.pem}:/app/keys/github_app.pem:ro
      - ${WORKSPACE_HOST_PATH:-/data/workspaces}:/data/workspaces
      - ${SERVICE_TEMPLATE_PATH:-../service-template}:/data/service-template:ro
      - uv-cache:/root/.cache/uv
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped
    deploy:
      replicas: 1

  # === Reverse Proxy + Registry ===

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./infra/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config
    environment:
      ORCHESTRATOR_HOSTNAME: ${ORCHESTRATOR_HOSTNAME}
      REGISTRY_USER: ${REGISTRY_USER}
      REGISTRY_PASSWORD_HASH: ${REGISTRY_PASSWORD_HASH}
    depends_on:
      - api
      - registry
    networks:
      - internal
    restart: unless-stopped

  registry:
    image: registry:2
    environment:
      REGISTRY_STORAGE_DELETE_ENABLED: "true"
    volumes:
      - registry-data:/var/lib/registry
    networks:
      - internal
    restart: unless-stopped

  # === Observability ===

  loki:
    image: grafana/loki:3.4
    command: -config.file=/etc/loki/loki.yml
    volumes:
      - ./infra/loki.yml:/etc/loki/loki.yml:ro
      - loki-data:/loki
    healthcheck:
      test: [ "CMD-SHELL", "wget --quiet --tries=1 --output-document=- http://localhost:3100/ready | grep -q ready" ]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s
    networks:
      - internal
    restart: unless-stopped

  promtail:
    image: grafana/promtail:3.4
    command: -config.file=/etc/promtail/promtail.yml
    volumes:
      - ./infra/promtail.yml:/etc/promtail/promtail.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

  admin-frontend:
    build:
      context: services/admin-frontend
      dockerfile: Dockerfile
    ports:
      - "3001:80"
    environment:
      ADMIN_USER: ${ADMIN_USER:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
    depends_on:
      api:
        condition: service_healthy
      grafana:
        condition: service_started
    networks:
      - internal
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.6.0
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
      GF_SECURITY_ALLOW_EMBEDDING: "true"
      GF_SERVER_ROOT_URL: "http://${ORCHESTRATOR_HOSTNAME:-localhost}:3001/grafana/"
      GF_SERVER_SERVE_FROM_SUB_PATH: "true"
      GF_LIVE_ALLOWED_ORIGINS: "*"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./infra/grafana/datasources.yml:/etc/grafana/provisioning/datasources/datasources.yml:ro
      - ./infra/grafana/dashboards.yml:/etc/grafana/provisioning/dashboards/dashboards.yml:ro
      - ./infra/grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

  # === Infrastructure ===

  db:
    image: pgvector/pgvector:pg16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-orchestrator}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 2s
      timeout: 1s
      retries: 5
      start_period: 5s
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - internal

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 2s
      timeout: 1s
      retries: 5
      start_period: 2s
    networks:
      - internal
      - worker

networks:
  internal:
    name: codegen_internal
  worker:
    name: codegen_worker

volumes:
  db_data:
  redis_data:
  caddy-data:
  caddy-config:
  registry-data:
  uv-cache:
  loki-data:
  grafana-data:
