services:
  # === Application Services ===

  api:
    build:
      context: .
      dockerfile: services/api/Dockerfile
    user: "${HOST_UID:-1000}:${HOST_GID:-1000}"
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379
      PYTHONPATH: /app
      GITHUB_WEBHOOK_SECRET: ${GITHUB_WEBHOOK_SECRET}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')" ]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - internal
    volumes:
      - ./services/api/src:/app/src:delegated
      - ./services/api/alembic.ini:/app/alembic.ini:ro
      - ./services/api/migrations:/app/migrations:delegated
      - ./shared:/app/shared:delegated
      - ./scripts:/app/scripts:ro
      - ./secrets/github_app.pem:/app/keys/github_app.pem:ro
    ports:
      - "8000:8000"

  langgraph:
    build:
      context: .
      dockerfile: services/langgraph/Dockerfile
    env_file:
      - .env
    environment:
      API_BASE_URL: http://api:8000
      PYTHONPYCACHEPREFIX: /tmp/pycache
      REDIS_URL: redis://redis:6379
      PYTHONPATH: /app
      DEFAULT_AGENT_TYPE: ${DEFAULT_AGENT_TYPE:-claude}
      GITHUB_ORG: ${GITHUB_ORG}
      PO_LLM_MODEL: ${PO_LLM_MODEL:-}
      PO_LLM_BASE_URL: ${PO_LLM_BASE_URL:-}
      PO_LLM_API_KEY: ${PO_LLM_API_KEY:-}
      CHECKPOINT_DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?options=-c%20search_path%3Dlanggraph
      SUMMARIZATION_MODEL: ${SUMMARIZATION_MODEL}
      SUMMARIZATION_MAX_TOKENS: ${SUMMARIZATION_MAX_TOKENS}
      SUMMARIZATION_TRIGGER_TOKENS: ${SUMMARIZATION_TRIGGER_TOKENS}
      SUMMARIZATION_MAX_SUMMARY_TOKENS: ${SUMMARIZATION_MAX_SUMMARY_TOKENS}
      SECRETS_ENCRYPTION_KEY: ${SECRETS_ENCRYPTION_KEY}
    volumes:
      - ./services/langgraph/src:/app/src:delegated
      - ./shared:/app/shared:delegated
      - ~/.ssh:/root/.ssh:ro
      - ./secrets/github_app.pem:/app/keys/github_app.pem:ro
    depends_on:
      db:
        condition: service_healthy
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  # Phase 4 Workers
  deploy-worker:
    build:
      context: .
      dockerfile: services/langgraph/Dockerfile
    command: python -m src.workers.deploy_worker
    env_file:
      - .env
    environment:
      API_BASE_URL: http://api:8000
      REDIS_URL: redis://redis:6379
      PYTHONPATH: /app
      SECRETS_ENCRYPTION_KEY: ${SECRETS_ENCRYPTION_KEY}
    volumes:
      - ./services/langgraph/src:/app/src:delegated
      - ./shared:/app/shared:delegated
      - ~/.ssh:/root/.ssh:ro
      - ./secrets/github_app.pem:/app/keys/github_app.pem:ro
    depends_on:
      - api
      - redis
    networks:
      - internal
    restart: unless-stopped
    deploy:
      replicas: 1

  engineering-worker:
    build:
      context: .
      dockerfile: services/langgraph/Dockerfile
    command: python -m src.workers.engineering_worker
    env_file:
      - .env
    environment:
      API_BASE_URL: http://api:8000
      REDIS_URL: redis://redis:6379
      PYTHONPATH: /app
      GITHUB_ORG: ${GITHUB_ORG}
      SECRETS_ENCRYPTION_KEY: ${SECRETS_ENCRYPTION_KEY}
    volumes:
      - ./services/langgraph/src:/app/src:delegated
      - ./shared:/app/shared:delegated
      - ./secrets/github_app.pem:/app/keys/github_app.pem:ro
    depends_on:
      - api
      - redis
    networks:
      - internal
    restart: unless-stopped
    deploy:
      replicas: 1

  infra-service:
    build:
      context: .
      dockerfile: services/infra-service/Dockerfile
    env_file:
      - .env
    environment:
      API_BASE_URL: http://api:8000
      REDIS_URL: redis://redis:6379
      PYTHONPATH: /app
    volumes:
      - ./services/infra-service/src:/app/src:delegated
      - ./services/infra-service/ansible:/app/ansible:delegated
      - ./shared:/app/shared:delegated
      - ~/.ssh:/root/.ssh:ro
    depends_on:
      - api
      - redis
    networks:
      - internal
    restart: unless-stopped

  telegram_bot:
    build:
      context: .
      dockerfile: services/telegram_bot/Dockerfile
    env_file:
      - .env
    environment:
      API_BASE_URL: http://api:8000
      PYTHONPYCACHEPREFIX: /tmp/pycache
      REDIS_URL: redis://redis:6379
      DEFAULT_AGENT_TYPE: ${DEFAULT_AGENT_TYPE:-claude}
    volumes:
      - ./services/telegram_bot/src:/app/src:delegated
      - ./shared:/app/shared:delegated
    depends_on:
      - api
      - redis
    networks:
      - internal

  worker-manager:
    build:
      context: .
      dockerfile: services/worker-manager/Dockerfile
    user: root # Required for Docker socket access
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379
      API_BASE_URL: http://api:8000
      # Worker URLs for containers in host network mode
      WORKER_REDIS_URL: redis://localhost:6379
      WORKER_API_URL: http://localhost:8000
      PYTHONPATH: /app
      SECRETS_ENCRYPTION_KEY: ${SECRETS_ENCRYPTION_KEY}
      # Host path for mounting .claude dir into workers
      HOST_CLAUDE_DIR: ${HOST_CLAUDE_DIR:-/home/user/.claude}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOST_CLAUDE_DIR:-/home/user/.claude}:/host-claude:ro
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  scheduler:
    build:
      context: .
      dockerfile: services/scheduler/Dockerfile
    env_file:
      - .env
    environment:
      API_BASE_URL: http://api:8000
      PYTHONPYCACHEPREFIX: /tmp/pycache
      REDIS_URL: redis://redis:6379
      PYTHONPATH: /app
    volumes:
      - ./services/scheduler/src:/app/src:delegated
      - ./shared:/app/shared:delegated
      - ~/.ssh:/root/.ssh:ro
      - ./secrets/github_app.pem:/app/keys/github_app.pem:ro
    depends_on:
      api:
        condition: service_healthy
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  scaffolder:
    build:
      context: .
      dockerfile: services/scaffolder/Dockerfile
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
      API_URL: http://api:8000
      GITHUB_APP_ID: ${GITHUB_APP_ID}
      GITHUB_APP_PRIVATE_KEY_PATH: /app/keys/github_app.pem
      GITHUB_ORG: ${GITHUB_ORG}
    volumes:
      - ./secrets/github_app.pem:/app/keys/github_app.pem:ro
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal
    restart: unless-stopped

  # === Infrastructure ===

  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-orchestrator}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 5s
      timeout: 3s
      retries: 5
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - internal

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379" # Expose for worker containers in host network mode
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - internal

networks:
  internal:


volumes:
  db_data:
  redis_data:
