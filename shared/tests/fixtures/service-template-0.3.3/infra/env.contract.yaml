version: "1"
owner: infra
entries:
  ENVIRONMENT:
    source: derived
    environments: [local, production]
    consumers: [backend, tg_bot, notifications_worker, frontend]
    required: true
  DEBUG:
    source: literal
    environments: [local]
    consumers: [backend]
    required: true
    value: true
  APP_NAME:
    source: derived
    environments: [local, production]
    consumers: [backend]
    required: true
  APP_ENV:
    source: derived
    environments: [local, production]
    consumers: [backend]
    required: true
  APP_SECRET_KEY:
    source: generated_secret
    environments: [local, production]
    consumers: [backend]
    required: true

  POSTGRES_HOST_PORT:
    source: literal
    environments: [local]
    required: true
    value: 5432


  REDIS_HOST_PORT:
    source: literal
    environments: [local]
    required: true
    value: 6379
  REDIS_URL:
    source: literal
    environments: [local, production]
    consumers: [backend, tg_bot, notifications_worker]
    required: true
    value: redis://redis:6379

