version: "1"
owner: infra
entries:
  COMPOSE_PROJECT_NAME:
    source: derived
    environments: [local, production]
    required: false
  HOST_UID:
    source: derived
    environments: [local]
    required: false
  HOST_GID:
    source: derived
    environments: [local]
    required: false

  BACKEND_INSTALL_DEV_DEPS:
    source: literal
    environments: [local]
    required: false
    value: false
  BACKEND_REPLICAS:
    source: literal
    environments: [production]
    required: false
    value: 1
  POSTGRES_HOST_PORT:
    source: literal
    environments: [local]
    required: true
    value: 5432


  TEST_REDIS_URL:
    source: literal
    environments: [local]
    required: false
    value: redis://localhost:6379/15
  TEST_REDIS_HOST:
    source: literal
    environments: [local]
    required: false
    value: localhost
  TEST_REDIS_PORT:
    source: literal
    environments: [local]
    required: false
    value: "6379"
  REDIS_HOST_PORT:
    source: literal
    environments: [local]
    required: true
    value: 6379
  REDIS_URL:
    source: literal
    environments: [local, production]
    consumers: [backend, tg_bot, notifications_worker]
    required: true
    value: redis://redis:6379

