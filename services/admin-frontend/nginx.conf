server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Basic auth for all locations (except health)
    auth_basic "Orchestrator Admin";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # API proxy — avoids CORS
    location /api/ {
        proxy_pass http://api:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Debug endpoints
    location /debug/ {
        proxy_pass http://api:8000/debug/;
        proxy_set_header Host $host;
    }

    # Health — no auth (for Docker healthcheck)
    location = /health {
        auth_basic off;
        proxy_pass http://api:8000/health;
        proxy_set_header Host $host;
    }

    # Grafana reverse proxy
    location /grafana/ {
        proxy_pass http://grafana:3000/grafana/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Grafana WebSocket (live features)
    location /grafana/api/live/ {
        proxy_pass http://grafana:3000/grafana/api/live/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
    }

    # SPA fallback — all non-file routes serve index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
