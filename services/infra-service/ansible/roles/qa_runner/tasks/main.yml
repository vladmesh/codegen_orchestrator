---
# QA Runner provisioning — installs Claude Code CLI and QA dependencies
# on prod servers for post-deploy testing.

- name: Create QA runner directory
  file:
    path: "{{ qa_runner_dir }}"
    state: directory
    owner: root
    mode: '0755'

# --- Swap (Claude Code installer needs ~2GB to unpack) ---

- name: Create swap file (2GB)
  shell: |
    fallocate -l 2G /swapfile
    chmod 600 /swapfile
    mkswap /swapfile
  args:
    creates: /swapfile

- name: Enable swap
  shell: swapon /swapfile
  changed_when: false
  failed_when: false

- name: Persist swap in fstab
  lineinfile:
    path: /etc/fstab
    line: "/swapfile none swap sw 0 0"
    state: present

# --- Claude Code CLI (standalone binary, no Node.js needed) ---

- name: Install Claude Code CLI via install script
  shell: curl -fsSL https://claude.ai/install.sh | bash
  args:
    creates: /root/.local/bin/claude
  environment:
    HOME: /root

- name: Add Claude Code to PATH in bashrc
  lineinfile:
    path: /root/.bashrc
    line: 'export PATH="$HOME/.local/bin:$PATH"'
    state: present

# --- Python QA dependencies (in venv, PEP 668) ---

- name: Install python3-venv
  apt:
    name: python3-venv
    state: present

- name: Create QA runner Python venv
  shell: python3 -m venv {{ qa_runner_dir }}/venv
  args:
    creates: "{{ qa_runner_dir }}/venv/bin/python"

- name: Install Python pip packages for QA (telethon, httpx)
  pip:
    name:
      - telethon
      - httpx
    state: present
    virtualenv: "{{ qa_runner_dir }}/venv"

# --- Claude Code session (copied from host) ---

- name: Create Claude config directory for root
  file:
    path: /root/.claude
    state: directory
    owner: root
    mode: '0700'

- name: Copy Claude Code credentials
  copy:
    src: "{{ claude_credentials_file }}"
    dest: /root/.claude/.credentials.json
    owner: root
    mode: '0600'
  no_log: true

- name: Configure Claude Code permissions (allowlist for QA)
  copy:
    dest: /root/.claude/settings.json
    owner: root
    mode: '0600'
    content: |
      {
        "permissions": {
          "allow": [
            "Bash(*)", "Read(*)", "Write(*)", "Edit(*)",
            "Glob(*)", "Grep(*)", "WebFetch(*)", "WebSearch(*)"
          ],
          "deny": []
        }
      }
  no_log: true

# --- Telethon session (optional) ---

- name: Copy Telethon session file
  copy:
    src: telethon.session
    dest: "{{ qa_runner_dir }}/telethon.session"
    owner: root
    mode: '0600'
  when: telethon_session_file is defined
