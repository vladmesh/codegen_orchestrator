---
- name: Ensure configured deploy user exists
  ansible.builtin.user:
    name: "{{ deploy_user }}"
    shell: /bin/bash
    create_home: true
    groups: docker
    append: true

- name: Create SSH directory for deploy user
  ansible.builtin.file:
    path: "/home/{{ deploy_user }}/.ssh"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0700"

- name: Authorize orchestrator key for deploy user
  ansible.builtin.lineinfile:
    dest: "/home/{{ deploy_user }}/.ssh/authorized_keys"
    line: "{{ ssh_public_key }}"
    create: true
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0600"
  when: ssh_public_key | length > 0

- name: Create isolated project root
  ansible.builtin.file:
    path: "{{ services_root }}"
    state: directory
    owner: root
    group: "{{ deploy_user }}"
    mode: "3770"
