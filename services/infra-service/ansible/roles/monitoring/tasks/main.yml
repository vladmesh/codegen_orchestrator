---
- name: Create monitoring directory
  file:
    path: /opt/monitoring
    state: directory
    mode: '0755'
  when: monitoring_enabled

- name: Allow node_exporter from orchestrator via UFW
  ufw:
    rule: allow
    from_ip: "{{ orchestrator_ip }}"
    port: "{{ node_exporter_port | string }}"
    proto: tcp
  when: monitoring_enabled and orchestrator_ip is defined

- name: Allow cadvisor from orchestrator via UFW
  ufw:
    rule: allow
    from_ip: "{{ orchestrator_ip }}"
    port: "{{ cadvisor_port | string }}"
    proto: tcp
  when: monitoring_enabled and orchestrator_ip is defined

- name: Create node_exporter and cadvisor docker-compose file
  copy:
    dest: /opt/monitoring/docker-compose.yml
    content: |
      services:
        node-exporter:
          image: prom/node-exporter:latest
          container_name: node-exporter
          restart: unless-stopped
          pid: host
          ports:
            - "{{ node_exporter_port }}:9100"
          volumes:
            - /proc:/host/proc:ro
            - /sys:/host/sys:ro
            - /:/rootfs:ro
          command:
            - '--path.procfs=/host/proc'
            - '--path.sysfs=/host/sys'
            - '--path.rootfs=/rootfs'
            - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'

        cadvisor:
          image: gcr.io/cadvisor/cadvisor:latest
          container_name: cadvisor
          restart: unless-stopped
          privileged: true
          ports:
            - "{{ cadvisor_port }}:8080"
          volumes:
            - /:/rootfs:ro
            - /var/run:/var/run:ro
            - /sys:/sys:ro
            - /var/lib/docker/:/var/lib/docker:ro
            - /dev/disk/:/dev/disk:ro
    mode: '0644'
  when: monitoring_enabled
  notify: restart monitoring

- name: Start monitoring stack
  community.docker.docker_compose_v2:
    project_src: /opt/monitoring
    state: present
  when: monitoring_enabled
