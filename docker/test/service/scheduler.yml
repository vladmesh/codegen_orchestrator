services:
  # Infrastructure
  db:
    image: pgvector/pgvector:pg16
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    tmpfs: /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Real API Service
  api:
    build: 
      context: ../../..
      dockerfile: services/api/Dockerfile
    command: ["/entrypoint.sh"]
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/postgres
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=test
      - SECRETS_ENCRYPTION_KEY=GkH0NqyqjG599M0K9fVwU34b_2i1-m_i_M80-82d2X0=
      - LK_JWT_SECRET=test-lk-jwt-secret
      - INTERNAL_API_KEY=test-internal-api-key-for-service-tests
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Scheduler Test Runner
  scheduler-test-runner:
    build:
      context: ../../..
      dockerfile: services/scheduler/Dockerfile.test
    command: ["pytest", "tests/service/", "-v"]
    environment:
      - API_BASE_URL=http://api:8000
      - REDIS_URL=redis://redis:6379/0
      - TELEGRAM_BOT_TOKEN=test-token-for-scheduler-tests
      - GITHUB_ORG_NAME=test-org
      - TIME4VPS_USERNAME=test
      - TIME4VPS_PASSWORD=test
      - INTERNAL_API_KEY=test-internal-api-key-for-service-tests
      - PYTHONPATH=/app:/app/src
    depends_on:
      api:
        condition: service_healthy
    volumes:
      - ../../../services/scheduler/src:/app/src
      - ../../../services/scheduler/tests:/app/tests
      - ../../../shared:/app/shared
