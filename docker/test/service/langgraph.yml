services:
  # The service under test
  langgraph:
    build:
      context: ../../..
      dockerfile: services/langgraph/Dockerfile
    environment:
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=test
      - ANTHROPIC_API_KEY=test
      - OPENAI_API_KEY=test
      - API_BASE_URL=http://api:8000
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_healthy

  # Real API (replaces MockServer — needed for contract/integration tests)
  api:
    build:
      context: ../../..
      dockerfile: services/api/Dockerfile
    command: ["/entrypoint.sh"]
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/postgres
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=test
      - SECRETS_ENCRYPTION_KEY=wHhIQWmPfLt60oHdxzbQhY1ZKnUon12e5_SuZ33xDxc=
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Infrastructure
  db:
    image: pgvector/pgvector:pg16
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    tmpfs: /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Test Runner
  langgraph-test-runner:
    build:
      context: ../../..
      dockerfile: services/langgraph/Dockerfile.test
    command: ["pytest", "tests/service/", "-v"]
    environment:
      - API_URL=http://api:8000
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../../../services/langgraph/src:/app/src
      - ../../../services/langgraph/tests:/app/tests
      - ../../../shared:/app/shared
