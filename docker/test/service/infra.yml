services:
  # The service under test
  infra-service:
    build:
      context: ../../..
      dockerfile: services/infra-service/Dockerfile
    command: ["sh", "-c", "trap 'exit 0' TERM INT; python -c 'import src.main'; sleep infinity & wait"]
    environment:
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=test
      - API_BASE_URL=http://api:8000
      - INTERNAL_API_KEY=test-internal-api-key-for-service-tests
    depends_on:
      redis:
        condition: service_healthy

  # Infrastructure
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Test Runner
  infra-test-runner:
    build:
      context: ../../..
      dockerfile: services/infra-service/Dockerfile.test
    command: ["pytest", "services/infra-service/tests/service", "-v"]
    environment:
      - REDIS_URL=redis://redis:6379/0
      - API_BASE_URL=http://api:8000
      - INTERNAL_API_KEY=test-internal-api-key-for-service-tests
    depends_on:
      infra-service:
        condition: service_started
    volumes:
      - ../../../services/infra-service/src:/app/services/infra-service/src
      - ../../../services/infra-service/tests:/app/services/infra-service/tests
      - ../../../shared:/app/shared
