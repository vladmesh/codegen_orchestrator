services:
  # Real API with DB — PO tools call this
  api:
    build:
      context: ../../..
      dockerfile: services/api/Dockerfile
    command: ["/entrypoint.sh"]
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/postgres
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=test
      - SECRETS_ENCRYPTION_KEY=wHhIQWmPfLt60oHdxzbQhY1ZKnUon12e5_SuZ33xDxc=
      - LK_JWT_SECRET=test-lk-jwt-secret
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Infrastructure
  db:
    image: pgvector/pgvector:pg16
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    tmpfs: /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Test Runner
  integration-test-runner:
    build:
      context: ../../..
      dockerfile: docker/test/integration/Dockerfile
    command: ["pytest", "tests/integration/po_tools/", "-v"]
    environment:
      - API_URL=http://api:8000
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      api:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ../../../tests:/app/tests
      - ../../../services:/app/services
      - ../../../shared:/app/shared
      - ../../../packages:/app/packages
