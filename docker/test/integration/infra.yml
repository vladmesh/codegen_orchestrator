networks:
  infra-test:
    name: infra-test-network
    driver: bridge

services:
  # Database
  db:
    image: pgvector/pgvector:pg16
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=postgres
    tmpfs: /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 2s
      timeout: 5s
      retries: 5
    networks:
      - infra-test

  # Redis
  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 5
    networks:
      - infra-test

  # API Service
  api:
    build:
      context: ../../..
      dockerfile: services/api/Dockerfile
    command: ["/entrypoint.sh"]
    environment:
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@db:5432/postgres
      - REDIS_URL=redis://redis:6379/0
      - ENVIRONMENT=test
      - LK_JWT_SECRET=test-lk-jwt-secret
      - INTERNAL_API_KEY=test-internal-api-key-for-integration-tests
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 2s
      timeout: 5s
      retries: 5
    networks:
      - infra-test

  # Scheduler Service (with consumer loop)
  system-config-seed:
    build:
      context: ../../..
      dockerfile: docker/test/integration/Dockerfile
    command:
      [
        "sh",
        "-c",
        "python /app/scripts/seed_system_configs.py --api-base-url http://api:8000 --configs-path /app/scripts/system_configs.yaml && touch /tmp/system-config-seeded && trap 'exit 0' TERM INT; sleep infinity & wait",
      ]
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "test", "-f", "/tmp/system-config-seeded"]
      interval: 2s
      timeout: 5s
      retries: 5
    networks:
      - infra-test

  scheduler:
    build:
      context: ../../..
      dockerfile: services/scheduler/Dockerfile
    environment:
      - REDIS_URL=redis://redis:6379/0
      - API_BASE_URL=http://api:8000
      - GITHUB_ORG_NAME=test-org
      - TIME4VPS_USERNAME=test
      - TIME4VPS_PASSWORD=test
      - HEALTH_CHECK_INTERVAL=300
      - INTERNAL_API_KEY=test-internal-api-key-for-integration-tests
    depends_on:
      system-config-seed:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - infra-test

  # Integration Test Runner
  integration-test-runner:
    build:
      context: ../../..
      dockerfile: docker/test/integration/Dockerfile
    command: ["pytest", "tests/integration/infra/", "-v", "-x"]
    environment:
      - PYTHONUNBUFFERED=1
      - REDIS_URL=redis://redis:6379/0
      - API_BASE_URL=http://api:8000
      - INTERNAL_API_KEY=test-internal-api-key-for-integration-tests
    depends_on:
      scheduler:
        condition: service_started
      api:
        condition: service_healthy
    volumes:
      - ../../../tests:/app/tests
      - ../../../shared:/app/shared
    networks:
      - infra-test
