server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker
    docker_sd_configs:
      # Orchestrator compose services
      - host: unix:///var/run/docker.sock
        refresh_interval: 10s
        filters:
          - name: label
            values: ["com.docker.compose.project=codegen_orchestrator"]
      # Worker containers spawned by worker-manager
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
        filters:
          - name: label
            values: ["com.codegen.type=worker"]

    relabel_configs:
      # Explicit job label (docker_sd_configs doesn't set it automatically)
      - replacement: docker
        target_label: job
      # Compose service name (for orchestrator services)
      - source_labels: ['__meta_docker_container_label_com_docker_compose_service']
        target_label: compose_service
      # Worker ID (for worker containers)
      - source_labels: ['__meta_docker_container_label_com_codegen_worker_id']
        target_label: worker_id
      # Container type: "worker" or empty (orchestrator)
      - source_labels: ['__meta_docker_container_label_com_codegen_type']
        target_label: container_type

    pipeline_stages:
      # Parse Docker JSON log format
      - docker: {}

      # Try to parse log line as JSON (structlog output)
      - json:
          expressions:
            service: service
            level: level
          source: output

      # Normalize "warn" → "warning" (Go loggers use "warn", Python uses "warning")
      - replace:
          expression: '(^warn$)'
          source: level
          replace: warning

      # Add extracted fields as labels
      - labels:
          service:
          level:
