name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:
    inputs:
      service_template_candidate_ref:
        description: Optional service-template tag or commit to test before updating the production pin
        required: false
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      api: ${{ steps.filter.outputs.api }}
      langgraph: ${{ steps.filter.outputs.langgraph }}
      scheduler: ${{ steps.filter.outputs.scheduler }}
      telegram: ${{ steps.filter.outputs.telegram }}
      worker-manager: ${{ steps.filter.outputs['worker-manager'] }}
      shared: ${{ steps.filter.outputs.shared }}
      packages: ${{ steps.filter.outputs.packages }}
      infra-service: ${{ steps.filter.outputs['infra-service'] }}
      docker-test: ${{ steps.filter.outputs['docker-test'] }}
      ci: ${{ steps.filter.outputs.ci }}
      deps: ${{ steps.filter.outputs.deps }}
      integration-tests: ${{ steps.filter.outputs['integration-tests'] }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'services/api/**'
            langgraph:
              - 'services/langgraph/**'
            scheduler:
              - 'services/scheduler/**'
            telegram:
              - 'services/telegram_bot/**'
            worker-manager:
              - 'services/worker-manager/**'
            shared:
              - 'shared/**'
            packages:
              - 'packages/**'
            infra-service:
              - 'services/infra-service/**'
            docker-test:
              - 'docker/test/**'
            ci:
              - '.github/workflows/**'
              - 'Makefile'
              - 'scripts/test-unit-local.sh'
              - 'scripts/check-ci-gate.py'
            deps:
              - 'pyproject.toml'
              - 'uv.lock'
              - 'services/*/pyproject.toml'
              - 'shared/**/pyproject.toml'
              - 'packages/**/pyproject.toml'
            integration-tests:
              - 'tests/integration/**'

  fast-checks:
    name: Fast Checks (Ruff & Unit Tests)
    runs-on: ubuntu-latest
    needs: detect-changes
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Check formatting with Ruff
        run: uv run ruff format --check .

      - name: Lint with Ruff
        run: uv run ruff check .

      - name: Run unit tests
        run: make test-unit

      - name: Run Redis capability cleanup regression
        run: |
          docker run --detach --rm --name redis-cleanup-contract redis:7-alpine
          trap 'docker rm --force redis-cleanup-contract' EXIT
          for _ in {1..10}; do
            docker exec redis-cleanup-contract redis-cli --raw ping | grep -qx PONG && break
            sleep 1
          done
          docker exec redis-cleanup-contract redis-cli --raw ping | grep -qx PONG
          LIVE_REDIS_CONTAINER=redis-cleanup-contract \
            uv run pytest -q tests/live/test_capability_cleanup_redis.py

  ci-contract:
    name: CI Contract
    runs-on: ubuntu-latest
    needs: detect-changes
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        run: uv sync

      - name: Validate CI gate contract
        run: make ci-contract

  test-service:
    name: Service Tests (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [detect-changes, fast-checks, ci-contract]
    if: needs.fast-checks.result == 'success' && needs.ci-contract.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            should_run: >-
              ${{
                (needs.detect-changes.outputs.api == 'true' ||
                needs.detect-changes.outputs.shared == 'true' ||
                needs.detect-changes.outputs.packages == 'true' ||
                needs.detect-changes.outputs['docker-test'] == 'true' ||
                needs.detect-changes.outputs.ci == 'true' ||
                needs.detect-changes.outputs.deps == 'true' ||
                needs.detect-changes.outputs['integration-tests'] == 'true' ||
                github.event_name == 'workflow_dispatch')
                && 'true' || 'false'
              }}
          - service: langgraph
            should_run: >-
              ${{
                (needs.detect-changes.outputs.langgraph == 'true' ||
                needs.detect-changes.outputs.shared == 'true' ||
                needs.detect-changes.outputs.packages == 'true' ||
                needs.detect-changes.outputs['docker-test'] == 'true' ||
                needs.detect-changes.outputs.ci == 'true' ||
                needs.detect-changes.outputs.deps == 'true' ||
                needs.detect-changes.outputs['integration-tests'] == 'true' ||
                github.event_name == 'workflow_dispatch')
                && 'true' || 'false'
              }}
          - service: scheduler
            should_run: >-
              ${{
                (needs.detect-changes.outputs.scheduler == 'true' ||
                needs.detect-changes.outputs.shared == 'true' ||
                needs.detect-changes.outputs.packages == 'true' ||
                needs.detect-changes.outputs['docker-test'] == 'true' ||
                needs.detect-changes.outputs.ci == 'true' ||
                needs.detect-changes.outputs.deps == 'true' ||
                needs.detect-changes.outputs['integration-tests'] == 'true' ||
                github.event_name == 'workflow_dispatch')
                && 'true' || 'false'
              }}
          - service: telegram_bot
            should_run: >-
              ${{
                (needs.detect-changes.outputs.telegram == 'true' ||
                needs.detect-changes.outputs.shared == 'true' ||
                needs.detect-changes.outputs.packages == 'true' ||
                needs.detect-changes.outputs['docker-test'] == 'true' ||
                needs.detect-changes.outputs.ci == 'true' ||
                needs.detect-changes.outputs.deps == 'true' ||
                needs.detect-changes.outputs['integration-tests'] == 'true' ||
                github.event_name == 'workflow_dispatch')
                && 'true' || 'false'
              }}
          - service: worker-manager
            should_run: >-
              ${{
                (needs.detect-changes.outputs['worker-manager'] == 'true' ||
                needs.detect-changes.outputs.shared == 'true' ||
                needs.detect-changes.outputs.packages == 'true' ||
                needs.detect-changes.outputs['docker-test'] == 'true' ||
                needs.detect-changes.outputs.ci == 'true' ||
                needs.detect-changes.outputs.deps == 'true' ||
                needs.detect-changes.outputs['integration-tests'] == 'true' ||
                github.event_name == 'workflow_dispatch')
                && 'true' || 'false'
              }}
          - service: infra
            should_run: >-
              ${{
                (needs.detect-changes.outputs['infra-service'] == 'true' ||
                needs.detect-changes.outputs.shared == 'true' ||
                needs.detect-changes.outputs.packages == 'true' ||
                needs.detect-changes.outputs['docker-test'] == 'true' ||
                needs.detect-changes.outputs.ci == 'true' ||
                needs.detect-changes.outputs.deps == 'true' ||
                needs.detect-changes.outputs['integration-tests'] == 'true' ||
                github.event_name == 'workflow_dispatch')
                && 'true' || 'false'
              }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        if: matrix.should_run == 'true'

      - name: Run service tests
        id: service-tests
        if: matrix.should_run == 'true'
        run: make test-service SERVICE=${{ matrix.service }}
        env:
          DOCKER_BUILDKIT: 1
          COMPOSE_DOCKER_CLI_BUILD: 1
          BUILDX_CACHE_TO: type=gha,mode=max,scope=service-${{ matrix.service }}
          BUILDX_CACHE_FROM: type=gha,scope=service-${{ matrix.service }}

      - name: Assert required service test ran
        if: always() && matrix.should_run == 'true'
        run: |
          if [ "${{ steps.service-tests.outcome }}" != "success" ]; then
            echo "Required service test did not complete successfully: ${{ matrix.service }}"
            echo "Outcome: ${{ steps.service-tests.outcome }}"
            exit 1
          fi

      - name: Not applicable to this PR
        if: matrix.should_run != 'true'
        run: echo "No relevant changes for ${{ matrix.service }} service tests"

  test-integration:
    name: Integration Tests (${{ matrix.suite }})
    runs-on: ubuntu-latest
    needs: [detect-changes, fast-checks, ci-contract]
    if: needs.fast-checks.result == 'success' && needs.ci-contract.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        include:
          - suite: backend
            should_run: >-
              ${{
                (github.event_name == 'workflow_dispatch')
                && 'true' || 'false'
              }}
          - suite: template
            should_run: >-
              ${{
                (needs.detect-changes.outputs['docker-test'] == 'true' ||
                needs.detect-changes.outputs['integration-tests'] == 'true' ||
                needs.detect-changes.outputs.ci == 'true' ||
                needs.detect-changes.outputs.deps == 'true' ||
                github.event_name == 'workflow_dispatch')
                && 'true' || 'false'
              }}
          - suite: frontend
            should_run: >-
              ${{
                (needs.detect-changes.outputs.telegram == 'true' ||
                needs.detect-changes.outputs.api == 'true' ||
                needs.detect-changes.outputs.shared == 'true' ||
                needs.detect-changes.outputs.packages == 'true' ||
                needs.detect-changes.outputs['docker-test'] == 'true' ||
                needs.detect-changes.outputs['integration-tests'] == 'true' ||
                needs.detect-changes.outputs.ci == 'true' ||
                needs.detect-changes.outputs.deps == 'true' ||
                github.event_name == 'workflow_dispatch')
                && 'true' || 'false'
              }}
          - suite: infra
            should_run: >-
              ${{
                (needs.detect-changes.outputs.scheduler == 'true' ||
                needs.detect-changes.outputs['infra-service'] == 'true' ||
                needs.detect-changes.outputs.api == 'true' ||
                needs.detect-changes.outputs.shared == 'true' ||
                needs.detect-changes.outputs.packages == 'true' ||
                needs.detect-changes.outputs['docker-test'] == 'true' ||
                needs.detect-changes.outputs['integration-tests'] == 'true' ||
                needs.detect-changes.outputs.ci == 'true' ||
                needs.detect-changes.outputs.deps == 'true' ||
                github.event_name == 'workflow_dispatch')
                && 'true' || 'false'
              }}
          - suite: po-tools
            should_run: >-
              ${{
                (needs.detect-changes.outputs.langgraph == 'true' ||
                needs.detect-changes.outputs.api == 'true' ||
                needs.detect-changes.outputs.shared == 'true' ||
                needs.detect-changes.outputs.packages == 'true' ||
                needs.detect-changes.outputs['docker-test'] == 'true' ||
                needs.detect-changes.outputs['integration-tests'] == 'true' ||
                needs.detect-changes.outputs.ci == 'true' ||
                needs.detect-changes.outputs.deps == 'true' ||
                github.event_name == 'workflow_dispatch')
                && 'true' || 'false'
              }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        if: matrix.should_run == 'true'

      - name: Set up Docker Buildx
        if: matrix.should_run == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Set up uv for template smoke
        if: matrix.should_run == 'true' && matrix.suite == 'template'
        uses: astral-sh/setup-uv@v6

      - name: Run integration tests
        id: integration-tests
        if: matrix.should_run == 'true'
        run: make test-integration-${{ matrix.suite }}
        env:
          DOCKER_BUILDKIT: 1
          COMPOSE_DOCKER_CLI_BUILD: 1
          BUILDX_CACHE_TO: type=gha,mode=max,scope=integration-${{ matrix.suite }}
          BUILDX_CACHE_FROM: type=gha,scope=integration-${{ matrix.suite }}

      - name: Assert required integration test ran
        if: always() && matrix.should_run == 'true'
        run: |
          if [ "${{ steps.integration-tests.outcome }}" != "success" ]; then
            echo "Required integration test did not complete successfully: ${{ matrix.suite }}"
            echo "Outcome: ${{ steps.integration-tests.outcome }}"
            exit 1
          fi

      - name: Not applicable to this PR
        if: matrix.should_run != 'true'
        run: echo "No relevant changes for ${{ matrix.suite }} integration tests"

      - name: Cleanup test containers
        if: always() && matrix.should_run == 'true'
        run: docker compose -p codegen_orchestrator_test_${{ matrix.suite }} -f docker/test/integration/${{ matrix.suite }}.yml down -v --remove-orphans 2>/dev/null || true

  template-compatibility:
    name: Template Compatibility (${{ matrix.entry }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [detect-changes, fast-checks, ci-contract]
    if: needs.fast-checks.result == 'success' && needs.ci-contract.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        include:
          - entry: baseline
            candidate: false
          - entry: candidate
            candidate: true
    steps:
      - name: Checkout code
        if: matrix.candidate == false || inputs.service_template_candidate_ref != ''
        uses: actions/checkout@v4

      - name: Set up uv
        if: matrix.candidate == false || inputs.service_template_candidate_ref != ''
        uses: astral-sh/setup-uv@v6

      - name: Run baseline compatibility smoke
        if: matrix.candidate == false
        run: make test-template-compat ARTIFACT_DIR="$RUNNER_TEMP/template-compat-${{ matrix.entry }}"

      - name: Run candidate compatibility smoke
        if: matrix.candidate == true && inputs.service_template_candidate_ref != ''
        run: make test-template-compat TEMPLATE_REF="$CANDIDATE_REF" ARTIFACT_DIR="$RUNNER_TEMP/template-compat-${{ matrix.entry }}"
        env:
          CANDIDATE_REF: ${{ inputs.service_template_candidate_ref }}

      - name: Candidate not requested
        if: matrix.candidate == true && inputs.service_template_candidate_ref == ''
        run: echo "No candidate ref was requested; production pin is unchanged"

      - name: Upload compatibility result
        if: always() && (matrix.candidate == false || inputs.service_template_candidate_ref != '')
        uses: actions/upload-artifact@v4
        with:
          name: template-compat-${{ matrix.entry }}
          path: ${{ runner.temp }}/template-compat-${{ matrix.entry }}/template-compat-result.json
          if-no-files-found: error

  merge-gate:
    name: Required CI Gate
    runs-on: ubuntu-latest
    needs:
      - detect-changes
      - fast-checks
      - ci-contract
      - test-service
      - test-integration
      - template-compatibility
    if: always()
    steps:
      - name: Check required jobs
        run: |
          declare -A results=(
            ["detect-changes"]="${{ needs.detect-changes.result }}"
            ["fast-checks"]="${{ needs.fast-checks.result }}"
            ["ci-contract"]="${{ needs.ci-contract.result }}"
            ["test-service"]="${{ needs.test-service.result }}"
            ["test-integration"]="${{ needs.test-integration.result }}"
            ["template-compatibility"]="${{ needs.template-compatibility.result }}"
          )

          failed=0
          for job in "${!results[@]}"; do
            result="${results[$job]}"
            echo "$job: $result"
            if [ "$result" != "success" ]; then
              failed=1
            fi
          done

          if [ "$failed" -ne 0 ]; then
            echo "Required CI gate failed"
            exit 1
          fi
