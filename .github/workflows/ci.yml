name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Job 1: Detect Changes - Identify which services have been modified
  detect-changes:
    name: Detect Changed Services
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      api: ${{ steps.filter.outputs.api }}
      langgraph: ${{ steps.filter.outputs.langgraph }}
      scheduler: ${{ steps.filter.outputs.scheduler }}
      telegram: ${{ steps.filter.outputs.telegram }}
      worker-manager: ${{ steps.filter.outputs.worker-manager }}
      shared: ${{ steps.filter.outputs.shared }}
      packages: ${{ steps.filter.outputs.packages }}
      infra-service: ${{ steps.filter.outputs.infra-service }}
      docker-test: ${{ steps.filter.outputs.docker-test }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'services/api/**'
            langgraph:
              - 'services/langgraph/**'
            scheduler:
              - 'services/scheduler/**'
            telegram:
              - 'services/telegram_bot/**'
            worker-manager:
              - 'services/worker-manager/**'
            shared:
              - 'shared/**'
            packages:
              - 'packages/**'
            infra-service:
              - 'services/infra-service/**'
            docker-test:
              - 'docker/test/**'
              - 'tests/integration/**'

  # Job 2: Fast Checks - Style checks and unit tests (always run)
  fast-checks:
    name: Fast Checks (Ruff & Unit Tests)
    runs-on: ubuntu-latest
    needs: detect-changes
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        run: pip install uv

      - name: Install dependencies
        # --locked: fail if uv.lock is out of sync with pyproject.toml instead of
        # silently re-resolving. Keeps CI/dev pinned to the committed lockfile.
        run: uv sync --locked

      - name: Verify requirements.lock files match uv.lock
        # Guards against the prod/test desync: every requirements.lock must be a
        # faithful export of uv.lock. Fails if deps changed without `make lock-deps`.
        run: make lock-check

      - name: Check formatting with Ruff
        run: uv run ruff format --check .

      - name: Lint with Ruff
        run: uv run ruff check .

      - name: Run unit tests
        run: make test-unit

  # Job 3: Service Tests - Tests requiring isolated Docker Compose infra
  test-service:
    name: Service Tests (${{ matrix.service }})
    runs-on: ubuntu-latest
    needs: [detect-changes, fast-checks]
    # Run only if fast checks passed
    if: needs.fast-checks.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        include:
          - service: api
            changed: ${{ needs.detect-changes.outputs.api }}
          - service: langgraph
            changed: ${{ needs.detect-changes.outputs.langgraph }}
          - service: scheduler
            changed: ${{ needs.detect-changes.outputs.scheduler }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        if: >-
          ${{
            matrix.changed == 'true' ||
            needs.detect-changes.outputs.shared == 'true' ||
            needs.detect-changes.outputs.docker-test == 'true' ||
            github.event_name == 'workflow_dispatch'
          }}

      - name: Run service tests
        if: >-
          ${{
            matrix.changed == 'true' ||
            needs.detect-changes.outputs.shared == 'true' ||
            needs.detect-changes.outputs.docker-test == 'true' ||
            github.event_name == 'workflow_dispatch'
          }}
        run: make test-service SERVICE=${{ matrix.service }}
        env:
          DOCKER_BUILDKIT: 1
          # Use Inline Buildx Caching with GitHub Actions cache backend
          COMPOSE_DOCKER_CLI_BUILD: 1
          BUILDX_CACHE_TO: type=gha,mode=max,scope=service-${{ matrix.service }}
          BUILDX_CACHE_FROM: type=gha,scope=service-${{ matrix.service }}

  # Job 4: Integration Tests - Parallel matrix across compose stacks
  # Runs only if requested via label on PR or manually via workflow_dispatch
  test-integration:
    name: Integration Tests (${{ matrix.suite }})
    runs-on: ubuntu-latest
    needs: [detect-changes, test-service]
    if: >
      needs.test-service.result == 'success' &&
      (github.event_name == 'workflow_dispatch' ||
       contains(github.event.pull_request.labels.*.name, 'run-integration-tests'))
    strategy:
      fail-fast: false
      matrix:
        include:
          # backend: langgraph + worker-manager + api
          - suite: backend
            should_run: >-
              ${{
                (needs.detect-changes.outputs.langgraph == 'true' ||
                needs.detect-changes.outputs.worker-manager == 'true' ||
                needs.detect-changes.outputs.api == 'true' ||
                needs.detect-changes.outputs.shared == 'true' ||
                needs.detect-changes.outputs.docker-test == 'true' ||
                github.event_name == 'workflow_dispatch')
                && 'true' || 'false'
              }}
          # template: always run (tests external copier template)
          - suite: template
            should_run: 'true'
          # frontend: telegram_bot + api
          - suite: frontend
            should_run: >-
              ${{
                (needs.detect-changes.outputs.telegram == 'true' ||
                needs.detect-changes.outputs.api == 'true' ||
                needs.detect-changes.outputs.shared == 'true' ||
                needs.detect-changes.outputs.docker-test == 'true' ||
                github.event_name == 'workflow_dispatch')
                && 'true' || 'false'
              }}
          # infra: scheduler + infra-service + api
          - suite: infra
            should_run: >-
              ${{
                (needs.detect-changes.outputs.scheduler == 'true' ||
                needs.detect-changes.outputs.infra-service == 'true' ||
                needs.detect-changes.outputs.api == 'true' ||
                needs.detect-changes.outputs.shared == 'true' ||
                needs.detect-changes.outputs.docker-test == 'true' ||
                github.event_name == 'workflow_dispatch')
                && 'true' || 'false'
              }}
          # po-tools: langgraph PO tools + api
          - suite: po-tools
            should_run: >-
              ${{
                (needs.detect-changes.outputs.langgraph == 'true' ||
                needs.detect-changes.outputs.api == 'true' ||
                needs.detect-changes.outputs.shared == 'true' ||
                needs.detect-changes.outputs.docker-test == 'true' ||
                github.event_name == 'workflow_dispatch')
                && 'true' || 'false'
              }}
    steps:
      - name: Checkout code
        if: matrix.should_run == 'true'
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        if: matrix.should_run == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Run integration tests
        if: matrix.should_run == 'true'
        run: make test-integration-${{ matrix.suite }}
        env:
          DOCKER_BUILDKIT: 1
          # Use Inline Buildx Caching with GitHub Actions cache backend
          COMPOSE_DOCKER_CLI_BUILD: 1
          BUILDX_CACHE_TO: type=gha,mode=max,scope=integration-${{ matrix.suite }}
          BUILDX_CACHE_FROM: type=gha,scope=integration-${{ matrix.suite }}

      - name: Skip notification
        if: matrix.should_run != 'true'
        run: echo "Skipped — no relevant changes for ${{ matrix.suite }} suite"

      - name: Cleanup test containers
        if: always() && matrix.should_run == 'true'
        run: docker compose -p codegen_orchestrator_test_${{ matrix.suite }} -f docker/test/integration/${{ matrix.suite }}.yml down -v --remove-orphans 2>/dev/null || true

