[project]
name = "orchestrator-cli"
version = "0.1.0"
description = "CLI for Codegen Orchestrator"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "typer>=0.9.0",
    "rich>=13.0.0",
    "pydantic>=2.0.0",
    "httpx>=0.25.0",
    "redis>=5.0.0",

    # shared/ deps used by orchestrator-cli (shared is COPY'd, not pip-installed)
    "pydantic-settings>=2.0.0",
    "structlog>=25.1.0",
    "cryptography>=43.0.0",
    "pynacl>=1.5.0",
    "pyyaml>=6.0",
]

[project.scripts]
orchestrator = "orchestrator_cli.main:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/orchestrator_cli"]
